<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LabOS Reagent Cart</title>
<style>
  body { width: 380px; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background: #0f172a; color: #f1f5f9; }
  header { padding: 14px 16px; background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  header h1 { margin: 0; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  header p { margin: 4px 0 0; font-size: 11px; opacity: 0.85; }
  .stats { display: flex; gap: 8px; padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; }
  .stat { flex: 1; text-align: center; }
  .stat-num { font-size: 18px; font-weight: 800; color: #818cf8; }
  .stat-lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  .cart { max-height: 320px; overflow-y: auto; padding: 8px; }
  .empty { padding: 32px 16px; text-align: center; color: #94a3b8; font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.6; }
  .item { padding: 10px 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; }
  .item img { width: 40px; height: 40px; object-fit: contain; background: #334155; border-radius: 4px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 12px; font-weight: 600; color: #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-meta { display: flex; gap: 6px; font-size: 10px; color: #94a3b8; margin-top: 2px; flex-wrap: wrap; }
  .item-vendor { background: #334155; padding: 1px 6px; border-radius: 4px; color: #cbd5e1; }
  .item-price { color: #22c55e; font-weight: 600; }
  .sync-status { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
  .sync-status.synced { background: rgba(34,197,94,0.2); color: #4ade80; }
  .sync-status.pending { background: rgba(234,179,8,0.2); color: #fbbf24; }
  .item-remove { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 2px 6px; }
  footer { padding: 12px 16px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 6px; flex-direction: column; }
  .btn { padding: 9px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
  .row { display: flex; gap: 6px; }
  .row .btn { flex: 1; }
  .connection { font-size: 10px; padding: 6px 12px; background: #0f172a; color: #94a3b8; }
  .connection.ok { color: #4ade80; }
  .connection.err { color: #f87171; }
</style>
</head>
<body>
  <header>
    <h1>🧪 LabOS Reagent Cart</h1>
    <p id="connection-status">Checking LabOS connection…</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-count">0</div>
      <div class="stat-lbl">Items</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-total">$0</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-vendors">0</div>
      <div class="stat-lbl">Vendors</div>
    </div>
  </div>

  <div class="cart" id="cart-list">
    <div class="empty">
      <div class="empty-icon">📦</div>
      No reagents captured yet.<br/>
      <span style="font-size: 11px; opacity: 0.7;">Visit Sigma, Thermo, VWR, etc. and click the orange "Add to LabOS" button.</span>
    </div>
  </div>

  <footer>
    <div class="row">
      <button class="btn btn-primary" id="capture-page" title="Capture the current tab as a LabOS cart item — works on ANY website, even ones the extension doesn't know about yet">
        🧪 Capture this page
      </button>
    </div>
    <div class="row">
      <button class="btn btn-primary" id="open-labos">🚀 Open LabOS Cart</button>
      <button class="btn btn-ghost" id="open-options">⚙️</button>
    </div>
    <div class="row">
      <button class="btn btn-ghost" id="voice-add">🎤 Voice add</button>
      <button class="btn btn-ghost" id="clear-all">Clear all</button>
    </div>
  </footer>

  <div class="connection" id="connection-row"></div>

  <script src="popup.js"></script>
</body>
</html>
